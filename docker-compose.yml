services:
  # Python Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: always
    depends_on:
      - redis

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.celery_app worker --loglevel=info
    env_file:
      - backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: always
    depends_on:
      - redis
      - backend

  # Next.js Frontend (Production Build)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile # Uses the PROD Dockerfile (node 20, npm run build)
      args:
        - NEXT_PUBLIC_API_URL=https://api.nxtdevs.app
    ports:
      - "3000:3000"

    restart: always
    depends_on:
      - backend
    env_file:
      - frontend/.env

  # Redis (Self-hosted in Docker)
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
